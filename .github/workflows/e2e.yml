name: E2E Smoke

# 로그인 없이 돌아가는 no-auth 스모크(부팅·auth-gate·검증·i18n·반응형)를 검증한다.
# auth tier(e2e/auth-flow.spec.js)는 E2E_EMAIL/E2E_PASSWORD가 없으면 자동 skip되므로
# 이 워크플로는 Supabase 시크릿 없이도 통과한다. 배포 워크플로(web-deploy.yml)와는 분리.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright (chromium)
        run: npx playwright install --with-deps chromium

      - name: Run E2E smoke
        run: npm run test:e2e

      - name: Upload report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
