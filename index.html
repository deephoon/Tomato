<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Tomato Final — Pixel Engine</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@700&family=VT323&family=DotGothic16&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/src/style.css" />
  <script>
    window.addEventListener('error', function(e) {
      document.body.innerHTML += '<div style="position:absolute; top:0; left:0; width:100%; color:red; padding:2rem; font-family:monospace; z-index:9999; font-weight:bold; background:rgba(0,0,0,0.9); pointer-events:none;">JS CRASH: ' + e.message + '<br>' + e.filename + ':' + e.lineno + '</div>';
    });
    window.addEventListener('unhandledrejection', function(e) {
      document.body.innerHTML += '<div style="position:absolute; top:0; left:0; width:100%; color:orange; padding:2rem; font-family:monospace; z-index:9999; font-weight:bold; background:rgba(0,0,0,0.9); pointer-events:none;">PROMISE CRASH: ' + e.reason + '</div>';
    });
  </script>
</head>
<body>
  <div id="canvas-container"></div>
  <div id="app-overlay">
    
    <nav class="utility-nav">
      <div class="nav-item interactable active-nav" id="nav-home">[ HOME ]</div>
      <div class="nav-item interactable" id="nav-calendar">[ PLANNER ]</div>
      <div class="nav-item interactable" id="nav-archive">[ ARCHIVE ]</div>
    </nav>

    <!-- 1. HOME -->
    <section id="view-home" class="view-layer active">
      <div class="hero-stage">
        <h2 class="section-title">TONIGHT'S MAIN FOCUS</h2>
        <div class="hero-block interactable" id="btn-ritual-start">
          <div class="block-glow"></div>
          <div class="block-content" id="home-card-content">
            <!-- Dynamic Injection -->
          </div>
        </div>
        <div class="action-prompt">>>> CLICK TO BEGIN RITUAL</div>
      </div>
    </section>

    <!-- 2. FOCUS STAGE -->
    <section id="view-focus" class="view-layer hidden">
      <div class="focus-center">
        <h1 id="time-left" class="time-pixel">00:00</h1>
        <div id="ritual-status" class="status-indicator">SIGNAL LOCKED // AWAITING...</div>
      </div>
      <div class="focus-controls">
        <div class="interactable action-btn" id="btn-ritual-pause">[ PAUSE ]</div>
        <div class="interactable action-btn btn-danger hidden" id="btn-ritual-complete">[ COMPLETE LOOP ]</div>
      </div>
    </section>

    <!-- 3. CALENDAR -->
    <section id="view-calendar" class="view-layer hidden">
      <div class="planner-container">
        <h2 class="section-title">FOCUS SLOTS // TODAY</h2>
        <div class="slot-grid" id="planner-grid">
          <!-- Planner Dynamic Render Target -->
        </div>
      </div>
    </section>

    <!-- 4. ARCHIVE -->
    <section id="view-archive" class="view-layer hidden">
      <div class="archive-container">
        <h2 class="section-title">RITUAL ARCHIVE</h2>
        <div class="stamp-gallery" id="archive-gallery">
          <!-- Archive Dynamic Render Target -->
        </div>
      </div>
    </section>

  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
