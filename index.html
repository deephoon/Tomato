<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#050505" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Surreal Pomodoro</title>
    <link rel="stylesheet" href="/src/style.css" />
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(err => console.log('SW registration failed: ', err));
        });
      }
    </script>
  </head>
  <body>
    <div id="app">
      <header class="top-bar">
        <h1 class="brand">POMODORO</h1>
        <button id="settings-btn" class="icon-btn" aria-label="Settings">
          <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
        </button>
      </header>

      <main class="timer-container">
        <div class="fluid-background"></div>
        <div class="timer-display">
          <div id="status-label" class="status-label">EMPTY</div>
          <div id="time-left" class="time-left">00:00</div>
        </div>
      </main>

      <footer class="controls">
        <div class="task-selector">
          <button id="task-a-btn" class="task-btn">Task A</button>
          <button id="task-b-btn" class="task-btn">Task B</button>
          <button id="break-btn" class="task-btn">Break</button>
        </div>
        <div class="main-actions">
          <button id="play-pause-btn" class="action-btn primary">
            <svg id="play-icon" viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
            <svg id="pause-icon" class="hidden" viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg>
          </button>
          <button id="stop-btn" class="action-btn secondary">
            <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect></svg>
          </button>
        </div>
      </footer>
    </div>
    
    <!-- Settings Modal -->
    <div id="settings-modal" class="modal hidden">
      <div class="modal-content">
        <h2>Settings</h2>
        <div class="setting-group">
          <label>Task A (minutes)</label>
          <input type="number" id="setting-task-a-time" min="1" max="120" value="25" />
          <input type="text" id="setting-task-a-name" value="Focus A" placeholder="Task Name" />
        </div>
        <div class="setting-group">
          <label>Task B (minutes)</label>
          <input type="number" id="setting-task-b-time" min="1" max="120" value="45" />
          <input type="text" id="setting-task-b-name" value="Focus B" placeholder="Task Name" />
        </div>
        <div class="setting-group">
          <label>Break (minutes)</label>
          <input type="number" id="setting-break-time" min="1" max="60" value="5" />
          <input type="text" id="setting-break-name" value="Break" placeholder="Task Name" />
        </div>
        <button id="save-settings-btn" class="action-btn primary full-width">Save</button>
        <button id="close-settings-btn" class="icon-btn modal-close"><svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></button>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
